name: Deploy Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_frontend:
        description: "Force deploy frontend (hosting)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      force_backend:
        description: "Force deploy backend (functions)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}

    steps:
      - uses: actions/checkout@v3

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'enable-device/**'
            backend:
              - 'functions/backend/**'

  deploy:
    runs-on: ubuntu-latest
    needs: detect-changes

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # 🔥 FRONTEND
      - name: Deploy hosting
        if: needs.detect-changes.outputs.frontend == 'true' || github.event.inputs.force_frontend == 'true'
        run: |
          cd enable-device
          npm install
          npm run build
          cd ..
          firebase deploy --only hosting --token ${{ secrets.FIREBASE_TOKEN }}

      # 🔥 BACKEND
      - name: Deploy functions
        if: needs.detect-changes.outputs.backend == 'true' || github.event.inputs.force_backend == 'true'
        run: |
          cd functions/backend
          npm install
          npm run build --if-present
          cd ../..
          firebase deploy --only functions --token ${{ secrets.FIREBASE_TOKEN }}
