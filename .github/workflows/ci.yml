name: CI

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  frontend:
    name: frontend-build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: enable-device

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build --if-present

  backend:
    name: backend-build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: functions/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build backend
        run: npm run build --if-present