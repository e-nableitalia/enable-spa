name: CI Build Only

on:
  push:
    branches:
      - develop
  pull_request:      

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 22

      # frontend
      - run: npm install
        working-directory: enable-device

      - run: npm run build
        working-directory: enable-device

      # backend
      - run: npm install
        working-directory: functions/backend

      - run: npm run build --if-present
        working-directory: functions/backend
